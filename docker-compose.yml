version: '3.8'

services:

  app:

    build:
      context: .

      dockerfile: Dockerfile

    container_name: laravel_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www

    networks:
      - laravel

  nginx:

    image: nginx:alpine

    container_name: nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx:/etc/nginx/conf.d

    networks:
      - laravel

  mysql:

    image: mysql:8

    container_name: mysql

    restart: unless-stopped

    environment:

      MYSQL_DATABASE: laravel

      MYSQL_ROOT_PASSWORD: root

      MYSQL_PASSWORD: root

      MYSQL_USER: laravel

    ports:
      - "3307:3306"

    networks:
      - laravel

networks:

  laravel: